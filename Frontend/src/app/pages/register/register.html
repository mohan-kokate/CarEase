<div class="form-page">
  <h2>Register</h2>
  <p class="err" *ngIf="error">{{ error }}</p>
  <form (ngSubmit)="register()">
    <input type="text" [(ngModel)]="name" name="name" placeholder="Full Name" required />
    <input type="email" [(ngModel)]="email" name="email" placeholder="Email" required />
    <input type="password" [(ngModel)]="password" name="password" placeholder="Password" required />
    <input type="tel" [(ngModel)]="phone" name="phone" placeholder="Phone (optional)" />
    <div class="role-row">
      <label><input type="radio" [(ngModel)]="role" name="role" value="USER" /> Rent a Car</label>
      <label
        ><input type="radio" [(ngModel)]="role" name="role" value="RENTER" /> List My Cars</label
      >
    </div>
    <button type="submit">Create Account</button>
  </form>
  <p>Have an account? <a routerLink="/login">Login</a></p>
</div>
